name: Publish Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/publish-images.yml"
      - "ai-service/**"
      - "frontend/**"
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/voiceprint-search-frontend
  AI_SERVICE_IMAGE: ghcr.io/${{ github.repository_owner }}/voiceprint-search-ai-service

jobs:
  publish-frontend:
    name: Publish Frontend Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract frontend metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  publish-ai-service:
    name: Publish AI Service Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract AI service metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.AI_SERVICE_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push AI service image
        uses: docker/build-push-action@v6
        with:
          context: ./ai-service
          file: ./ai-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ai-service
          cache-to: type=gha,mode=max,scope=ai-service

  redeploy-portainer:
    name: Redeploy Portainer Stack
    runs-on: ubuntu-latest
    needs:
      - publish-frontend
      - publish-ai-service
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Portainer redeploy
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
          PORTAINER_BASE_URL: https://portainer.kitsunet.app
          PORTAINER_STACK_ID: "39"
          PORTAINER_ENDPOINT_ID: "3"
        run: |
          if [ -z "$PORTAINER_API_KEY" ]; then
            echo "::error::PORTAINER_API_KEY secret is not configured"
            exit 1
          fi
          if [ -z "$CF_ACCESS_CLIENT_ID" ] || [ -z "$CF_ACCESS_CLIENT_SECRET" ]; then
            echo "::error::Cloudflare Access service token secrets are not configured"
            exit 1
          fi

          response_file="$(mktemp)"
          http_code="$(curl --silent --show-error \
            --output "$response_file" \
            --write-out "%{http_code}" \
            --request PUT \
            --header "CF-Access-Client-ID: $CF_ACCESS_CLIENT_ID" \
            --header "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            --header "X-API-Key: $PORTAINER_API_KEY" \
            --header "Content-Type: application/json" \
            --data '{"RepullImageAndRedeploy":true}' \
            "$PORTAINER_BASE_URL/api/stacks/$PORTAINER_STACK_ID/git/redeploy?endpointId=$PORTAINER_ENDPOINT_ID")"

          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            cat "$response_file"
            exit 0
          fi

          if [ "$http_code" = "504" ]; then
            echo "::warning::Portainer redeploy timed out through Cloudflare after the request was accepted. Check the stack update time in Portainer if confirmation is needed."
            cat "$response_file"
            exit 0
          fi

          cat "$response_file"
          echo "::error::Portainer redeploy failed with HTTP $http_code"
          exit 1
