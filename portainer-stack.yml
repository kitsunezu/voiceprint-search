services:
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/kitsunezu/voiceprint-search-frontend:main}
    pull_policy: always
    container_name: voiceprint-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3010}:3000"
    environment:
      NODE_ENV: production
      AI_SERVICE_URL: http://ai-service:8000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3010}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${FRONTEND_OTEL_SERVICE_NAME:-voiceprint-frontend}
    depends_on:
      ai-service:
        condition: service_healthy
    networks:
      - voiceprint-net

  ai-service:
    image: ${AI_SERVICE_IMAGE:-ghcr.io/kitsunezu/voiceprint-search-ai-service:main}
    pull_policy: always
    container_name: voiceprint-ai
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://voiceprint:${DB_PASSWORD:-voiceprint}@db:5432/voiceprint
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-voiceprint-audio}
      MODEL_CACHE_DIR: /models
      ENABLED_MODELS: ${ENABLED_MODELS:-ecapa-tdnn-v1}
      PREPROCESS_NORMALIZE_MAX_SECONDS: ${PREPROCESS_NORMALIZE_MAX_SECONDS:-240}
      PREPROCESS_MAX_SPEECH_SECONDS: ${PREPROCESS_MAX_SPEECH_SECONDS:-180}
      SEPARATOR_PROFILE: ${SEPARATOR_PROFILE:-demucs}
      SEPARATOR_MODEL_OVERRIDE: ${SEPARATOR_MODEL_OVERRIDE:-}
      SEPARATOR_MODEL_DIR: /models/separators
      SEPARATOR_CACHE_DIR: /tmp/voiceprint-separator-cache
      SEPARATOR_MAX_CONCURRENT_JOBS: ${SEPARATOR_MAX_CONCURRENT_JOBS:-1}
      SEPARATOR_MAX_SECONDS: ${SEPARATOR_MAX_SECONDS:-240}
      SEARCH_STRATEGY: ${SEARCH_STRATEGY:-hybrid}
      SEARCH_HYBRID_BEST_WEIGHT: ${SEARCH_HYBRID_BEST_WEIGHT:-0.7}
      SEARCH_HYBRID_CENTROID_WEIGHT: ${SEARCH_HYBRID_CENTROID_WEIGHT:-0.3}
      HOUSEKEEP_ENABLED: ${HOUSEKEEP_ENABLED:-true}
      HOUSEKEEP_INTERVAL_SECONDS: ${HOUSEKEEP_INTERVAL_SECONDS:-3600}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${AI_OTEL_SERVICE_NAME:-voiceprint-ai-service}
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - model-cache:/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      db-init:
        condition: service_completed_successfully
    networks:
      - voiceprint-net

  worker:
    image: ${AI_SERVICE_IMAGE:-ghcr.io/kitsunezu/voiceprint-search-ai-service:main}
    pull_policy: always
    container_name: voiceprint-worker
    restart: unless-stopped
    command: ["python", "-m", "dramatiq", "--processes", "1", "--threads", "1", "app.worker.tasks"]
    environment:
      DATABASE_URL: postgresql+asyncpg://voiceprint:${DB_PASSWORD:-voiceprint}@db:5432/voiceprint
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-voiceprint-audio}
      MODEL_CACHE_DIR: /models
      ENABLED_MODELS: ${ENABLED_MODELS:-ecapa-tdnn-v1}
      PREPROCESS_NORMALIZE_MAX_SECONDS: ${PREPROCESS_NORMALIZE_MAX_SECONDS:-240}
      PREPROCESS_MAX_SPEECH_SECONDS: ${PREPROCESS_MAX_SPEECH_SECONDS:-180}
      SEPARATOR_PROFILE: ${SEPARATOR_PROFILE:-demucs}
      SEPARATOR_MODEL_OVERRIDE: ${SEPARATOR_MODEL_OVERRIDE:-}
      SEPARATOR_MODEL_DIR: /models/separators
      SEPARATOR_CACHE_DIR: /tmp/voiceprint-separator-cache
      SEPARATOR_MAX_CONCURRENT_JOBS: ${SEPARATOR_MAX_CONCURRENT_JOBS:-1}
      SEPARATOR_MAX_SECONDS: ${SEPARATOR_MAX_SECONDS:-240}
      SEARCH_STRATEGY: ${SEARCH_STRATEGY:-hybrid}
      SEARCH_HYBRID_BEST_WEIGHT: ${SEARCH_HYBRID_BEST_WEIGHT:-0.7}
      SEARCH_HYBRID_CENTROID_WEIGHT: ${SEARCH_HYBRID_CENTROID_WEIGHT:-0.3}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${WORKER_OTEL_SERVICE_NAME:-voiceprint-worker}
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - model-cache:/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      db-init:
        condition: service_completed_successfully
    networks:
      - voiceprint-net

  db:
    image: pgvector/pgvector:pg16
    pull_policy: always
    container_name: voiceprint-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: voiceprint
      POSTGRES_PASSWORD: ${DB_PASSWORD:-voiceprint}
      POSTGRES_DB: voiceprint
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voiceprint"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voiceprint-net

  db-init:
    image: pgvector/pgvector:pg16
    pull_policy: always
    container_name: voiceprint-db-init
    restart: "no"
    environment:
      PGPASSWORD: ${DB_PASSWORD:-voiceprint}
    depends_on:
      db:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        psql -v ON_ERROR_STOP=1 -h db -U voiceprint -d voiceprint <<'SQL'
        BEGIN;

        CREATE EXTENSION IF NOT EXISTS vector;

        CREATE TABLE IF NOT EXISTS speakers (
          id SERIAL PRIMARY KEY,
          name VARCHAR(255) NOT NULL,
          description TEXT,
          created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
          updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
        );

        CREATE TABLE IF NOT EXISTS audio_assets (
          id SERIAL PRIMARY KEY,
          speaker_id INTEGER REFERENCES speakers(id) ON DELETE SET NULL,
          original_filename VARCHAR(512) NOT NULL,
          storage_key VARCHAR(512) NOT NULL,
          duration_seconds REAL,
          sample_rate INTEGER,
          processing_status VARCHAR(32) NOT NULL DEFAULT 'pending',
          processing_error TEXT,
          processing_started_at TIMESTAMPTZ,
          processing_finished_at TIMESTAMPTZ,
          has_speech BOOLEAN DEFAULT TRUE,
          created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
        );

        CREATE TABLE IF NOT EXISTS embeddings (
          id SERIAL PRIMARY KEY,
          speaker_id INTEGER NOT NULL REFERENCES speakers(id) ON DELETE CASCADE,
          audio_asset_id INTEGER NOT NULL REFERENCES audio_assets(id) ON DELETE CASCADE,
          vector vector,
          model_version VARCHAR(100) NOT NULL DEFAULT 'ecapa-tdnn-v1',
          embedding_dim INTEGER NOT NULL DEFAULT 192,
          created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
        );

        ALTER TABLE speakers ADD COLUMN IF NOT EXISTS description TEXT;
        ALTER TABLE speakers ADD COLUMN IF NOT EXISTS created_at TIMESTAMPTZ NOT NULL DEFAULT NOW();
        ALTER TABLE speakers ADD COLUMN IF NOT EXISTS updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW();

        ALTER TABLE audio_assets ADD COLUMN IF NOT EXISTS processing_status VARCHAR(32);
        ALTER TABLE audio_assets ADD COLUMN IF NOT EXISTS processing_error TEXT;
        ALTER TABLE audio_assets ADD COLUMN IF NOT EXISTS processing_started_at TIMESTAMPTZ;
        ALTER TABLE audio_assets ADD COLUMN IF NOT EXISTS processing_finished_at TIMESTAMPTZ;
        ALTER TABLE audio_assets ADD COLUMN IF NOT EXISTS has_speech BOOLEAN DEFAULT TRUE;

        UPDATE audio_assets
        SET processing_status = CASE
          WHEN EXISTS (
            SELECT 1
            FROM embeddings e
            WHERE e.audio_asset_id = audio_assets.id
          ) THEN 'succeeded'
          WHEN has_speech = FALSE THEN 'no_speech'
          ELSE 'pending'
        END
        WHERE processing_status IS NULL;

        UPDATE audio_assets
        SET processing_finished_at = created_at
        WHERE processing_finished_at IS NULL
          AND processing_status IN ('succeeded', 'no_speech');

        ALTER TABLE audio_assets ALTER COLUMN processing_status SET DEFAULT 'pending';
        ALTER TABLE audio_assets ALTER COLUMN processing_status SET NOT NULL;

        ALTER TABLE embeddings ALTER COLUMN vector TYPE vector;
        ALTER TABLE embeddings ADD COLUMN IF NOT EXISTS model_version VARCHAR(100);
        ALTER TABLE embeddings ADD COLUMN IF NOT EXISTS embedding_dim INTEGER;

        UPDATE embeddings
        SET model_version = 'ecapa-tdnn-v1'
        WHERE model_version IS NULL OR model_version = '';

        UPDATE embeddings
        SET embedding_dim = 192
        WHERE embedding_dim IS NULL;

        ALTER TABLE embeddings ALTER COLUMN model_version SET DEFAULT 'ecapa-tdnn-v1';
        ALTER TABLE embeddings ALTER COLUMN model_version SET NOT NULL;
        ALTER TABLE embeddings ALTER COLUMN embedding_dim SET DEFAULT 192;
        ALTER TABLE embeddings ALTER COLUMN embedding_dim SET NOT NULL;

        CREATE INDEX IF NOT EXISTS idx_embeddings_speaker ON embeddings (speaker_id);
        CREATE INDEX IF NOT EXISTS idx_audio_assets_speaker ON audio_assets (speaker_id);
        CREATE INDEX IF NOT EXISTS idx_audio_assets_processing_status ON audio_assets (processing_status);
        CREATE INDEX IF NOT EXISTS idx_embeddings_model ON embeddings (model_version, embedding_dim);

        COMMIT;
        SQL
    networks:
      - voiceprint-net

  redis:
    image: redis:7-alpine
    pull_policy: always
    container_name: voiceprint-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voiceprint-net

  minio:
    image: minio/minio:latest
    pull_policy: always
    container_name: voiceprint-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - voiceprint-net

volumes:
  pgdata:
  redis-data:
  minio-data:
  model-cache:

networks:
  voiceprint-net:
    driver: bridge